    <section class="dashboard-section">
      <div class="container">
        <div class="dashboard-grid" id="dashboard-content">

          <div class="dashboard-loading" id="dashboard-loading">

            <p>Loading dashboard data...</p>
          </div>

          <!-- Error State -->
          <div class="dashboard-error" id="dashboard-error" style="display: none;">
            <i class="fas fa-exclamation-circle"></i>
            <p>Unable to load dashboard data. Please try again later.</p>
            <button class="btn btn-secondary" onclick="loadDashboardData()">Retry</button>
